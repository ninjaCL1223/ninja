<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/asserts/ballon-favicon.png?v=2">
    <title>Ninja</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .date-diff {
        color: red;
        text-align: center;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <img src="asserts/ninjia.png" alt="Ninja">
    <div class="date-diff" id="date-diff"></div>
    <script>
      const currentDate = new Date();
      const startTime = Date.UTC(2012, 5, 30);
      const currentTime = Date.UTC(
        currentDate.getFullYear(),
        currentDate.getMonth(),
        currentDate.getDate()
      );
      const msPerDay = 24 * 60 * 60 * 1000;
      const dayDiff = Math.floor((currentTime - startTime) / msPerDay);

      document.getElementById("date-diff").textContent = dayDiff;
    </script>
  </body>
</html>
